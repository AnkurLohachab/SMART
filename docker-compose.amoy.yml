# Override: parallel backend on port 8001 wired to Polygon Amoy, reusing the
# local stack's neo4j + minio.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.amoy.yml up -d backend-amoy
#
# Required env vars (read at compose-up time):
#   AMOY_PRIVATE_KEY  must derive <YOUR_DEPLOYER_ADDRESS>
#   AMOY_RPC_URL      optional; defaults to public Amoy RPC

services:
  backend-amoy:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smart-backend-amoy
    ports:
      - "8001:8000"
    mem_limit: 2g
    mem_reservation: 1g
    entrypoint: ["/bin/sh", "-c"]
    # No /deployments/.env.contracts; the env block below is authoritative.
    command:
      - |
        echo "Starting backend in Amoy mode (chain 80002)"
        echo "  rpc:        $${WEB3_PROVIDER_URL}"
        echo "  lifecycle:  $${SMART_LIFECYCLE_ADDRESS}"
        exec uvicorn app.main:app --host 0.0.0.0 --port 8000
    environment:
      - APP_NAME=SMART API (Amoy)
      - DEBUG=False
      - HOST=0.0.0.0
      - PORT=8000

      # Storage - share with the local stack
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=
      - NEO4J_DATABASE=amoy
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_SECURE=False
      - MINIO_BUCKET_NAME=model-cards-amoy
      - MINIO_URL=http://minio:9000

      # Blockchain - Polygon Amoy
      - WEB3_PROVIDER_URL=${AMOY_RPC_URL:-https://rpc-amoy.polygon.technology}
      - INFURA_URL=${AMOY_RPC_URL:-https://rpc-amoy.polygon.technology}
      - CHAIN_ID=80002
      - MAX_GAS_PRICE=200

      # Deployer wallet (loaded from host env at compose-up)
      - PRIVATE_KEY=${AMOY_PRIVATE_KEY}
      - RELAYER_PRIVATE_KEY=${AMOY_PRIVATE_KEY}
      - WALLET_ADDRESS=<YOUR_DEPLOYER_ADDRESS>

      # Smart-contract addresses on Amoy
      - SMART_LIFECYCLE_ADDRESS=0xEe74288FFa63f8D1296246555020DAaEd39D9f4d
      - SMART_RELAYER_ADDRESS=0x3D8F67a3C8A0EB96D0121C0027D3d50e70e9f506
      - SMART_LIFECYCLE_RELAYER_ADDRESS=0x3D8F67a3C8A0EB96D0121C0027D3d50e70e9f506
      - SMART_IDENTITY_REGISTRY_ADDRESS=0xd8B65DD93124154ECCF1eE19E539089B28b9eEBa
      - SMART_NAME_REGISTRY_ADDRESS=0x33dBa2073dDf06eb63771B919a57D8acfd0882d2
      - SMART_VERSION_REGISTRY_ADDRESS=0xb933DFE26fF2CcbF871655885E05d49efA7e4A33
      - SMART_MODEL_CARD_SBT_ADDRESS=0xc02feb491f2519200e27D49A5B075F12a9d12FD1
      - MODEL_CARD_REGISTRY_ADDRESS=0x6e34779Cb495F4F82e9bB8b6DE4B52D647FAdC18
      - SMART_ACCOUNT_FACTORY_ADDRESS=0xF8bD5Dd89d6BAdE88E2D21943e4Bc73d4895a7f5
      - SMART_PAYMASTER_ADDRESS=0xc7534e0300cF96FE945De01b97116323eB7B2dFD
      - SMART_USERNAME_REGISTRY_ADDRESS=0xeF3f8FAE59928F5eA1Ba2F16c869AA1321E7a8c2
      - ENTRYPOINT_ADDRESS=0x5FF137D4b0FDCD49DcA30c7CF57E578a026d2789

      # Role hashes (keccak256, from the deployed contracts)
      - DEVELOPER_ROLE=0x4504b9dfd7400a1522f49a8b4a100552da9236849581fd59b7363eb48c6a474c
      - AUTHENTICATOR_ROLE=0x190acb99f29d9641c9ad47655049f2d7c78fcbc837d62e7981d28c871f722081
      - PUBLISHER_ROLE=0xe80a9cba93bb15ddf0cd35ac63a8ca08d53c8deeb9f0e47a75b8a62f15055a8d
      - ADMIN_ROLE=0xa49807205ce4d355092ef5a8a18f56e8913cf4a201fbe287825b095693c21775

      - JWT_SECRET_KEY=amoy-dev-key-change-in-production
      - JWT_ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=120
      - OTP_EXPIRY_SECONDS=300
      - TOKEN_EXPIRY_SECONDS=3600

      - CORS_ORIGINS=http://localhost:3000,http://localhost:8001
    depends_on:
      neo4j:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - smart-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
